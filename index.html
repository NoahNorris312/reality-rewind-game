<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reality Rewind Challenge</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
      background: #111;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: var(--bg);
      background-size: cover;
      background-position: center;
      filter: brightness(45%) blur(1px);
      transform: scale(1.04);
      z-index: -2;
      transition: background-image 0.5s ease-in-out;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, rgba(0,0,0,.72), rgba(30,30,80,.45));
      z-index: -1;
    }

    .game-box {
      max-width: 820px;
      margin: 0 auto;
      padding: 40px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: center;
    }

    .card {
      background: rgba(0,0,0,.68);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 24px;
      padding: 30px;
      box-shadow: 0 18px 50px rgba(0,0,0,.45);
      backdrop-filter: blur(7px);
    }

    h1 {
      margin-top: 0;
      font-size: 42px;
      letter-spacing: .5px;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .pill {
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 999px;
      padding: 10px 15px;
      font-weight: bold;
    }

    #timer.warning {
      animation: pulse .6s infinite alternate;
    }

    @keyframes pulse {
      from { transform: scale(1); }
      to { transform: scale(1.08); }
    }

    #scenario {
      font-size: 25px;
      line-height: 1.3;
      margin: 25px 0;
      font-weight: bold;
    }

    .choices {
      display: grid;
      gap: 14px;
      margin-top: 20px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 15px 18px;
      font-size: 17px;
      cursor: pointer;
      font-weight: bold;
      transition: transform .15s, filter .15s, opacity .15s;
    }

    button:hover:not(:disabled) {
      transform: translateY(-2px);
      filter: brightness(1.12);
    }

    .choice-btn {
      background: white;
      color: #181818;
    }

    .rewind-btn {
      margin-top: 25px;
      background: linear-gradient(90deg, #775cff, #00d4ff);
      color: white;
    }

    .rewind-btn:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    .start-btn, .restart-btn {
      background: linear-gradient(90deg, #ff4d8d, #ffb84d);
      color: white;
      margin-top: 20px;
    }

    #message {
      min-height: 42px;
      margin-top: 18px;
      font-size: 19px;
      white-space: pre-line;
      font-weight: bold;
    }

    .small {
      opacity: .85;
      font-size: 15px;
      line-height: 1.5;
    }

    .hidden { display: none; }
  </style>
</head>

<body>
  <div class="game-box">
    <div class="card">
      <h1>🎤 Reality Rewind Challenge</h1>

      <div id="startScreen">
        <p class="small">
          Make the best choice in 5 awkward real-life scenarios.
          You only get ONE rewind, and it can only be used after you mess up.
        </p>
        <button class="start-btn" onclick="startGame()">Start Game</button>
      </div>

      <div id="gameScreen" class="hidden">
        <div class="top-row">
          <div class="pill" id="progress">Scenario 1 / 5</div>
          <div class="pill" id="score">Score: 0</div>
          <div class="pill" id="timer">Time: 15</div>
          <div class="pill" id="rewindStatus">Rewind: Available</div>
        </div>

        <div id="scenario"></div>
        <div id="choices" class="choices"></div>
        <p id="message"></p>
        <button id="rewindBtn" class="rewind-btn" onclick="useRewind()" disabled>⏪ Use Rewind Redemption</button>
      </div>

      <div id="endScreen" class="hidden">
        <h2 id="finalScore"></h2>
        <p id="finalMessage"></p>
        <button class="restart-btn" onclick="restartGame()">Play Again</button>
      </div>
    </div>
  </div>

  <script>
    const scenarios = [
      {
        text: "You walk up to someone at a bar and your first line comes out awkward. What do you say instead?",
        bg: "url('https://images.unsplash.com/photo-1514933651103-005eec06c04b?auto=format&fit=crop&w=1600&q=80')",
        choices: [
          "Do you believe in love at first sight, or should I walk by again?",
          "Hey, I like your style. What’s your name?",
          "So... you come here often?"
        ],
        correct: 1
      },
      {
        text: "You trip walking into class and everyone sees it. What is the smooth recovery?",
        bg: "url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1?auto=format&fit=crop&w=1600&q=80')",
        choices: [
          "Laugh it off and say, 'Had to make an entrance.'",
          "Sprint back out of the room.",
          "Blame the floor loudly."
        ],
        correct: 0
      },
      {
        text: "You accidentally send a risky text to the wrong person. What is your best move?",
        bg: "url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=1600&q=80')",
        choices: [
          "Send 15 more texts explaining yourself.",
          "Throw your phone across the room.",
          "Stay calm and send a simple correction."
        ],
        correct: 2
      },
      {
        text: "You are giving a presentation and completely blank out. What should you do?",
        bg: "url('https://images.unsplash.com/photo-1475721027785-f74eccf877e2?auto=format&fit=crop&w=1600&q=80')",
        choices: [
          "Pause, breathe, and check your next point.",
          "Say 'I forgot everything' and sit down.",
          "Start beatboxing to distract everyone."
        ],
        correct: 0
      },
      {
        text: "You miss an easy shot in a big game. Everyone groans. What is the best response?",
        bg: "url('https://images.unsplash.com/photo-1546519638-68e109498ffc?auto=format&fit=crop&w=1600&q=80')",
        choices: [
          "Blame your teammate immediately.",
          "Stay composed and get ready for the next play.",
          "Retire from sports forever."
        ],
        correct: 1
      }
    ];

    let current = 0;
    let score = 0;
    let rewindUsed = false;
    let canRewind = false;
    let locked = false;
    let timer = 15;
    let timerInterval = null;
    let wrongQuestionIndex = null;

    const startScreen = document.getElementById("startScreen");
    const gameScreen = document.getElementById("gameScreen");
    const endScreen = document.getElementById("endScreen");
    const rewindBtn = document.getElementById("rewindBtn");

    function playRewindSound() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      const ctx = new AudioContext();

      for (let i = 0; i < 6; i++) {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();

        osc.type = "sawtooth";
        osc.frequency.setValueAtTime(700 - i * 85, ctx.currentTime + i * 0.045);
        gain.gain.setValueAtTime(0.08, ctx.currentTime + i * 0.045);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.045 + 0.08);

        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(ctx.currentTime + i * 0.045);
        osc.stop(ctx.currentTime + i * 0.045 + 0.09);
      }
    }

    function playCorrectSound() {
      beep(520, 0.08);
      setTimeout(() => beep(760, 0.1), 90);
    }

    function playWrongSound() {
      beep(210, 0.22);
    }

    function beep(freq, duration) {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      const ctx = new AudioContext();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();

      osc.type = "sine";
      osc.frequency.value = freq;
      gain.gain.value = 0.08;

      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
      osc.stop(ctx.currentTime + duration);
    }

    function startGame() {
      startScreen.classList.add("hidden");
      endScreen.classList.add("hidden");
      gameScreen.classList.remove("hidden");
      loadScenario();
    }

    function loadScenario() {
      locked = false;
      canRewind = false;
      timer = 15;

      const s = scenarios[current];
      document.body.style.setProperty("--bg", s.bg);

      document.getElementById("progress").textContent = `Scenario ${current + 1} / ${scenarios.length}`;
      document.getElementById("score").textContent = `Score: ${score}`;
      document.getElementById("timer").textContent = `Time: ${timer}`;
      document.getElementById("timer").classList.remove("warning");
      document.getElementById("rewindStatus").textContent = rewindUsed ? "Rewind: Used" : "Rewind: Available";
      document.getElementById("scenario").textContent = s.text;
      document.getElementById("message").textContent = "";
      rewindBtn.disabled = true;

      const choicesDiv = document.getElementById("choices");
      choicesDiv.innerHTML = "";

      s.choices.forEach((choice, index) => {
        const btn = document.createElement("button");
        btn.className = "choice-btn";
        btn.textContent = choice;
        btn.onclick = () => makeChoice(index);
        choicesDiv.appendChild(btn);
      });

      startTimer();
    }

    function startTimer() {
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timer--;
        document.getElementById("timer").textContent = `Time: ${timer}`;

        if (timer <= 5) {
          document.getElementById("timer").classList.add("warning");
        }

        if (timer <= 0) {
          clearInterval(timerInterval);
          makeChoice(-1);
        }
      }, 1000);
    }

    function makeChoice(choice) {
      if (locked) return;
      locked = true;
      clearInterval(timerInterval);

      const s = scenarios[current];
      const buttons = document.querySelectorAll(".choice-btn");
      buttons.forEach(btn => btn.disabled = true);

      if (choice === s.correct) {
        score++;
        playCorrectSound();
        document.getElementById("message").textContent = "✅ Smooth choice. Reality approves.";
        setTimeout(nextScenario, 1300);
      } else {
        playWrongSound();
        wrongQuestionIndex = current;

        if (!rewindUsed) {
          canRewind = true;
          rewindBtn.disabled = false;
          document.getElementById("message").textContent =
            choice === -1
              ? "⏰ Time ran out. This is your cringe moment... use your rewind redemption!"
              : "❌ That was rough. Use your rewind redemption to try again!";
        } else {
          document.getElementById("message").textContent =
            choice === -1
              ? "⏰ Time ran out, and your rewind is already gone."
              : "❌ Wrong choice, and your rewind is already gone.";
          setTimeout(nextScenario, 1700);
        }
      }
    }

    function useRewind() {
      if (rewindUsed) {
        document.getElementById("message").textContent = "❌ Rewind already used!";
        return;
      }

      if (!canRewind || wrongQuestionIndex !== current) {
        document.getElementById("message").textContent = "⚠️ You can only rewind right after a wrong answer.";
        return;
      }

      rewindUsed = true;
      canRewind = false;
      playRewindSound();
      document.getElementById("message").textContent = "⏪ Reality rewound. Redemption time.";
      document.getElementById("rewindStatus").textContent = "Rewind: Used";
      setTimeout(loadScenario, 900);
    }

    function nextScenario() {
      current++;
      if (current < scenarios.length) {
        loadScenario();
      } else {
        endGame();
      }
    }

    function endGame() {
      clearInterval(timerInterval);
      gameScreen.classList.add("hidden");
      endScreen.classList.remove("hidden");
      document.body.style.setProperty("--bg", "url('https://images.unsplash.com/photo-1492684223066-81342ee5ff30?auto=format&fit=crop&w=1600&q=80')");

      document.getElementById("finalScore").textContent = `Final Score: ${score}/5`;

      let msg = "";
      if (score === 5) msg = "🔥 Perfect run. You are basically living life in director’s cut mode.";
      else if (score >= 3) msg = "👍 Solid. A few awkward moments, but the remote saved your dignity.";
      else msg = "😬 Tough run. You definitely need the Reality Rewind Remote.";

      document.getElementById("finalMessage").textContent = msg;
    }

    function restartGame() {
      current = 0;
      score = 0;
      rewindUsed = false;
      canRewind = false;
      locked = false;
      wrongQuestionIndex = null;
      endScreen.classList.add("hidden");
      gameScreen.classList.remove("hidden");
      loadScenario();
    }

    // Default opening background
    document.body.style.setProperty("--bg", "url('https://images.unsplash.com/photo-1492684223066-81342ee5ff30?auto=format&fit=crop&w=1600&q=80')");
  </script>
</body>
</html>
